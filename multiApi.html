<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Círculo de Quintas - Guitarra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .circle-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }

        .circle-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, 
                #ff6b6b 0deg 30deg,
                #ee5a6f 30deg 60deg,
                #c44569 60deg 90deg,
                #f8b500 90deg 120deg,
                #f6d365 120deg 150deg,
                #fda085 150deg 180deg,
                #4ecdc4 180deg 210deg,
                #44a08d 210deg 240deg,
                #95e1d3 240deg 270deg,
                #a8e6cf 270deg 300deg,
                #dcedc1 300deg 330deg,
                #c7ceea 330deg 360deg);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2), inset 0 0 30px rgba(255, 255, 255, 0.3);
            border: 3px solid #333;
        }

        .notes-container {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .note {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            transform-origin: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .note:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .note.active {
            background: #ffeb3b;
            border-color: #f57f17;
            transform: scale(1.2);
            box-shadow: 0 0 30px rgba(255, 235, 59, 0.8), 0 8px 25px rgba(0, 0, 0, 0.3);
            animation: pulse 0.6s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 235, 59, 0.8), 0 8px 25px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 0 50px rgba(255, 235, 59, 1), 0 8px 35px rgba(0, 0, 0, 0.4); }
        }

        .info-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .toggle-mode {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: white;
            color: #667eea;
            transform: scale(1.05);
        }

        .mode-btn:hover {
            transform: translateY(-3px);
        }

        .chords-display {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        .chord {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .chord.scale {
            background: rgba(255, 255, 255, 0.35);
            border-left-color: #ffeb3b;
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .chord-name {
            font-size: 16px;
            font-weight: bold;
        }

        .chord-degree {
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .selected-note {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .legend {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 12px;
        }

        .legend-item {
            margin: 5px 0;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .circle-wrapper {
                width: 300px;
                height: 300px;
            }

            .note {
                width: 50px;
                height: 50px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 Círculo de Quintas - Guitarra 🎸</h1>
        
        <div class="main-content">
            <div class="circle-wrapper">
                <div class="circle-container">
                    <div class="notes-container" id="notesContainer"></div>
                </div>
            </div>

            <div class="info-section">
                <div>
                    <div class="selected-note" id="selectedNote">Selecciona una nota</div>
                    
                    <div class="toggle-mode">
                        <button class="mode-btn active" onclick="setMode('major')">Mayor</button>
                        <button class="mode-btn" onclick="setMode('minor')">Menor</button>
                    </div>
                </div>

                <div class="chords-display" id="chordsDisplay">
                    <p style="text-align: center; opacity: 0.7;">Haz clic en una nota del círculo para ver sus acordes</p>
                </div>

                <div class="legend">
                    <div class="legend-item">✨ Acordes destacados = acordes que forman la escala</div>
                    <div class="legend-item">🎵 I, IV, V (Mayor) / i, iv, v (Menor)</div>
                </div>
            </div>
        </div>
    </div>

    <script src="multiApi.js"></script>
</body>
</html>
