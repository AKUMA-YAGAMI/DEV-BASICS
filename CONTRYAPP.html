<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUNTRY APP</title>
    <link rel="stylesheet" href="country-style.css">
</head>
<body>
    <div class="container">
        <div class="country-app">
            <div class="red-circle"></div>
            
            <div class="controls">
                <input type="text" id="input" placeholder="Enter country name">
                <button id="button">Search</button>
            </div>
            
            <div id="loading" class="loading">Searching...</div>
            <div id="error" class="error-message"></div>
            <div id="div" class="result-display"></div>
        </div>
    </div>


   <script src="country.js"></script>
</body>
</html>
